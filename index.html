<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#22223b" />
    <meta name="description" content="離線可用的音樂祭行程規劃工具" />
    <title>音樂祭行程規劃 - Music Festival Planner</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // GitHub Pages SPA 重導：把 404 重導過來的路徑還原
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = sessionStorage.redirect || l.pathname + l.search + l.hash;
          sessionStorage.redirect = '';
          history.replaceState(null, '', l.pathname.slice(0, -1) + decoded);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
