name: Publish Festival Data

on:
  push:
    paths:
      - 'festivals/*.json'
      - 'src/pwa/schema.js'
      - 'scripts/validate-festivals.mjs'
  workflow_dispatch:

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Validate and filter festivals
        run: npm run validate:festivals
      - name: Commit and push to data-live
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -B data-live
          # 這兩個是 build 產物，被 .gitignore 忽略；data-live 分支刻意要發布它們，所以強制加入
          git add -f filtered-festivals.json public/festivals/index.json
          git commit -m "Update live festival data" || echo "Nothing to commit"
          git push --force origin data-live
